# .github/workflows/ci_cd.yml
# Smart eCommerce — CI/CD pipeline
#
# Triggers:
#   push  → main    : full pipeline (build → test → push → deploy)
#   push  → feature/* : build + test only
#   PR to main       : build + test only

name: Smart eCommerce CI/CD

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_SCRAPING: ghcr.io/${{ github.repository }}/scraping
  IMAGE_ML:       ghcr.io/${{ github.repository }}/ml

jobs:

  # ────────────────────────────────────────────────────────────────────
  # Job 1: Lint + Unit Tests (runs on every push)
  # ────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install \
            pandas numpy scikit-learn joblib \
            beautifulsoup4 requests lxml \
            pytest pytest-cov

      - name: Run Scraping tests
        run: pytest Scraping/tests/test_agents.py -v
        
      - name: Run TopKselection tests
        run: python -m pytest TopKselection/tests/test_module2.py -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────────
  # Job 2: Build + Push Docker Images (main branch only)
  # ────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push scraping image
        uses: docker/build-push-action@v5
        with:
          context: smart_ecommerce
          file:    smart_ecommerce/KubeflowPipelines/docker/Dockerfile.scraping
          push:    true
          tags: |
            ${{ env.IMAGE_SCRAPING }}:latest
            ${{ env.IMAGE_SCRAPING }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push ML image
        uses: docker/build-push-action@v5
        with:
          context: smart_ecommerce
          file:    smart_ecommerce/KubeflowPipelines/docker/Dockerfile.ml
          push:    true
          tags: |
            ${{ env.IMAGE_ML }}:latest
            ${{ env.IMAGE_ML }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────
  # Job 3: Compile + Deploy Pipeline to Kubeflow (main branch only)
  # ────────────────────────────────────────────────────────────────────
  deploy-pipeline:
    name: Deploy Kubeflow Pipeline
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install kfp SDK
        run: pip install kfp==2.7.0

      - name: Compile pipeline to YAML
        run: |
          python smart_ecommerce/KubeflowPipelines/pipeline/smart_ecommerce_pipeline.py \
            --compile \
            --output pipeline.yaml

      - name: Upload pipeline YAML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeflow-pipeline
          path: pipeline.yaml

      - name: Deploy to Kubeflow cluster
        if: ${{ env.KFP_HOST != '' }}
        env:
          KFP_HOST:     ${{ secrets.KFP_HOST }}
          KFP_USERNAME: ${{ secrets.KFP_USERNAME }}
          KFP_PASSWORD: ${{ secrets.KFP_PASSWORD }}
        run: |
          python smart_ecommerce/KubeflowPipelines/pipeline/smart_ecommerce_pipeline.py \
            --submit \
            --host "$KFP_HOST" \
            --urls https://hydrogen-demo-store.myshopify.com \
            --k 50